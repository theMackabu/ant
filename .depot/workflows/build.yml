# Depot CI Migration
# Source: .github/workflows/build.yml
#
# Changes made:
# - Rewrote .github/ path references to .depot/
# - Changed GitHub runs-on labels to their Depot equivalents

name: Build All Platforms
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  actions: read
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
jobs:
  prepare:
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    if: |
      github.ref_type != 'tag' &&
      !contains(github.event.head_commit.message || '', '(ci-ignore)') &&
      !contains(github.event.pull_request.title || '', '(ci-ignore)') && (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'pull_request' ||
        (github.event_name == 'push' && contains(github.event.head_commit.message, '[ci] trigger build'))
      )
    outputs:
      timestamp: ${{ steps.timestamp.outputs.value }}
    steps:
      - id: timestamp
        run: echo "value=$(date +%s)" >> $GITHUB_OUTPUT
  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-glibc-x64
            runner: ubuntu-24.04
            container: ubuntu:22.04
            shell: bash
          - platform: linux-glibc-aarch64
            runner: ubuntu-24.04-arm
            container: ubuntu:22.04
            shell: bash
          - platform: linux-musl-x64
            runner: ubuntu-24.04
            container: alpine:3.23
            shell: sh
          - platform: linux-musl-aarch64
            runner: ubuntu-24.04-arm
            container: alpine:3.23
            shell: sh
          - platform: macos-x64
            runner: macos-15-intel
            container: ''
            shell: bash
          - platform: macos-aarch64
            runner: macos-15
            container: ''
            shell: bash
          - platform: windows-x64
            runner: windows-latest
            container: ''
            shell: msys2 {0}
    uses: ./.depot/workflows/build-platform.yml
    with:
      platform: ${{ matrix.platform }}
      runner: ${{ matrix.runner }}
      container: ${{ matrix.container }}
      shell: ${{ matrix.shell }}
      build_timestamp: ${{ needs.prepare.outputs.timestamp }}
  nanos-x64:
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    uses: ./.depot/workflows/build-nanos.yml
    with:
      arch: x64
      artifact: ant-linux-x64-musl
      runner: ubuntu-latest
      image: ant-sandbox-x64
  nanos-aarch64:
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    uses: ./.depot/workflows/build-nanos.yml
    with:
      arch: aarch64
      artifact: ant-linux-aarch64-musl
      runner: ubuntu-24.04-arm
      image: ant-sandbox-aarch64
  summary:
    name: Version
    needs: [build]
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    if: ${{ !cancelled() && needs.build.result != 'skipped' }}
    steps:
      - name: Download version artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: version-*
          path: versions
      - name: Generate summary
        run: |
          VERSIONS=()
          for dir in versions/version-*; do
            v=$(cat "$dir/version.txt" 2>/dev/null || echo "N/A")
            VERSIONS+=("$v")
          done

          UNIQUE=($(printf '%s\n' "${VERSIONS[@]}" | sort -u))

          if [[ ${#UNIQUE[@]} -ne 1 ]]; then
            echo "::error::Version mismatch across platforms: ${UNIQUE[*]}"
            echo "## ❌ Version Mismatch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Expected all platforms to have the same version, but found: ${UNIQUE[*]}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "## Build Version: \`${UNIQUE[0]}\`" >> $GITHUB_STEP_SUMMARY
  refresh-manifest:
    name: Refresh manifest
    needs: [build, nanos-x64, nanos-aarch64]
    runs-on: depot-ubuntu-latest # was: ubuntu-latest. Mapped standard GitHub runner to Depot equivalent.
    if: ${{ always() && !cancelled() && (needs.build.result == 'success' || needs.nanos-x64.result == 'success' || needs.nanos-aarch64.result == 'success') }}
    steps:
      - name: Refresh manifest
        env:
          MANIFEST_REFRESH_TOKEN: ${{ secrets.MANIFEST_REFRESH_TOKEN }}
        if: ${{ env.MANIFEST_REFRESH_TOKEN != '' }}
        run: |
          curl -fsS -X POST -G https://manifest.antjs.org/v1/refresh \
            --data-urlencode "branch=${GITHUB_REF_NAME}" \
            --data-urlencode "run_id=${GITHUB_RUN_ID}" \
            -H "Authorization: Bearer ${MANIFEST_REFRESH_TOKEN}"
