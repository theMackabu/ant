name: Nix Cache

on:
  push:
    branches:
      - master
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
          - name: linux-aarch64
            runner: ubuntu-24.04-arm
          - name: macos-x64
            runner: macos-15-intel
          - name: macos-aarch64
            runner: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3

      - name: Configure Cachix
        if: ${{ env.CACHIX_AUTH_TOKEN == '' }}
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: ant
          skipPush: true

      - name: Configure Cachix with push access
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71
        with:
          name: ant
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Prepare compiler cache
        run: |
          mkdir -p /tmp/ant-nix-ccache
          chmod -R 0777 /tmp/ant-nix-ccache

      - name: Cache compiler objects
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: /tmp/ant-nix-ccache
          key: nix-ccache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('flake.lock') }}
          restore-keys: |
            nix-ccache-${{ runner.os }}-${{ runner.arch }}-

      - name: Fix compiler cache permissions
        run: chmod -R 0777 /tmp/ant-nix-ccache

      - name: Build Ant
        run: nix build .#ant --accept-flake-config --print-build-logs --option extra-sandbox-paths /tmp/ant-nix-ccache
