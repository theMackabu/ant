name: Build Nanos Kernel
run-name: Build Nanos Kernel (${{ inputs.arch }})

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target architecture (x64 or aarch64)'
        required: true
        type: string
      runner:
        description: 'GitHub Actions runner to use'
        required: false
        default: ''
        type: string
      nanos_ref:
        description: 'Nanos git ref to build'
        required: false
        default: master
        type: string
    outputs:
      version:
        description: Ant version written to ant.version
        value: ${{ jobs.kernel.outputs.version }}
      artifact:
        description: Stable kernel artifact name
        value: ${{ jobs.kernel.outputs.artifact }}
      versioned_artifact:
        description: Versioned kernel artifact name
        value: ${{ jobs.kernel.outputs.versioned_artifact }}
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: aarch64
        type: choice
        options:
          - x64
          - aarch64
      nanos_ref:
        description: 'Nanos git ref to build'
        required: false
        default: master
        type: string

permissions:
  contents: read

jobs:
  kernel:
    name: Patched Nanos Kernel (${{ inputs.arch }})
    runs-on: ${{ inputs.runner || (inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest') }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact: ${{ steps.names.outputs.artifact }}
      versioned_artifact: ${{ steps.names.outputs.versioned_artifact }}
    env:
      NANOS_PLATFORM: ${{ inputs.arch == 'aarch64' && 'virt' || 'pc' }}
      NANOS_ARCH: ${{ inputs.arch == 'aarch64' && 'aarch64' || 'x86_64' }}
    steps:
      - name: Checkout Ant
        uses: actions/checkout@v5

      - name: Resolve Ant version
        id: version
        run: |
          set -euo pipefail

          version=$(tr -d '[:space:]' < meson/ant.version)
          safe_version=${version//[^A-Za-z0-9._-]/-}
          mkdir -p nanos-kernel
          printf '%s\n' "$version" > nanos-kernel/ant.version

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "safe_version=${safe_version}" >> "$GITHUB_OUTPUT"
          echo "Using Ant base version ${version}"

      - name: Resolve artifact names
        id: names
        run: |
          set -euo pipefail
          artifact="nanos-kernel-${{ inputs.arch }}"
          versioned_artifact="${artifact}-${{ steps.version.outputs.safe_version }}"
          echo "artifact=${artifact}" >> "$GITHUB_OUTPUT"
          echo "versioned_artifact=${versioned_artifact}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            curl \
            git \
            jq \
            lld \
            llvm \
            make \
            python3 \
            xxd

          if [[ "${{ inputs.arch }}" == "x64" ]]; then
            sudo apt-get install -y nasm
          fi

      - name: Checkout Nanos
        run: |
          set -euo pipefail
          git init nanos-src
          git -C nanos-src remote add origin https://github.com/nanovms/nanos.git
          git -C nanos-src fetch --depth 1 origin "${{ inputs.nanos_ref }}"
          git -C nanos-src checkout --detach FETCH_HEAD

      - name: Apply Ant sandbox Nanos patches
        run: |
          set -euo pipefail
          for patch in nanos/patches/*.patch; do
            echo "Applying ${patch}"
            git -C nanos-src apply "$GITHUB_WORKSPACE/$patch"
          done

      - name: Build kernel.img
        run: |
          set -euo pipefail
          make -C nanos-src PLATFORM="$NANOS_PLATFORM" ARCH="$NANOS_ARCH" CC=clang kernel
          cp "nanos-src/output/platform/${NANOS_PLATFORM}/bin/kernel.img" nanos-kernel/kernel.img

      - name: Kernel info
        run: |
          set -euo pipefail
          kernel_size=$(du -sh nanos-kernel/kernel.img | cut -f1)
          echo "## nanos-kernel (${{ inputs.arch }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Ant version: \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Nanos ref: \`${{ inputs.nanos_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| kernel.img | $kernel_size |" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload stable kernel
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.names.outputs.artifact }}
          path: |
            nanos-kernel/kernel.img
            nanos-kernel/ant.version
          retention-days: 7

      - name: Upload versioned kernel
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.names.outputs.versioned_artifact }}
          path: |
            nanos-kernel/kernel.img
            nanos-kernel/ant.version
          retention-days: 7
