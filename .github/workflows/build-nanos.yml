name: Build Nanos Image

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target architecture (x64 or aarch64)'
        required: true
        type: string
      artifact:
        description: 'Ant binary artifact name to download'
        required: false
        default: ''
        type: string
      runner:
        description: 'GitHub Actions runner to use'
        required: false
        default: ''
        type: string
      image:
        description: 'Nanos image name'
        required: false
        default: ''
        type: string
      source_run_id:
        description: 'Workflow run ID containing the Ant binary artifact'
        required: false
        default: ''
        type: string
      source_revision:
        description: 'Full Ant git revision for the Ant binary artifact'
        required: false
        default: ''
        type: string
      nanos_ref:
        description: 'Nanos git ref to patch/build'
        required: false
        default: '125520f4d2db172e5fbf384bd1afc7a2d1171570'
        type: string
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: x64
        type: choice
        options:
          - x64
          - aarch64
      source_run_id:
        description: 'Workflow run ID containing the Alpine/musl Ant artifact to reuse (blank uses latest successful run on this branch)'
        required: false
        default: ''
        type: string
      source_revision:
        description: 'Full Ant git revision for the Ant binary artifact'
        required: false
        default: ''
        type: string
      artifact:
        description: 'Ant binary artifact name (blank uses the arch default)'
        required: false
        default: ''
        type: string
      image:
        description: 'Nanos image name (blank uses the arch default)'
        required: false
        default: ''
        type: string
      nanos_ref:
        description: 'Nanos git ref to patch/build'
        required: false
        default: '125520f4d2db172e5fbf384bd1afc7a2d1171570'
        type: string

permissions:
  actions: read
  contents: read

jobs:
  nanos:
    name: Nanos Image (${{ inputs.arch }})
    runs-on: ${{ inputs.runner || (inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest') }}
    env:
      NANOS_ARTIFACT: ${{ inputs.artifact || (inputs.arch == 'aarch64' && 'ant-linux-aarch64-musl' || 'ant-linux-x64-musl') }}
      NANOS_IMAGE: ${{ inputs.image || (inputs.arch == 'aarch64' && 'ant-sandbox-aarch64' || 'ant-sandbox-x64') }}
      OPS_ARCH: ${{ inputs.arch == 'aarch64' && 'arm64' || 'amd64' }}
      NANOS_PLATFORM: ${{ inputs.arch == 'aarch64' && 'virt' || 'pc' }}
      NANOS_ARCH: ${{ inputs.arch == 'aarch64' && 'aarch64' || 'x86_64' }}
      NANOS_REF: ${{ inputs.nanos_ref }}
      SANDBOX_ARCH: ${{ inputs.arch }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Validate workflow inputs
        run: |
          set -euo pipefail
          case "$SANDBOX_ARCH" in
            x64|aarch64) ;;
            *)
              echo "::error::Invalid arch '${SANDBOX_ARCH}' (allowed: x64, aarch64)"
              exit 1
              ;;
          esac

          if [[ ! "$NANOS_REF" =~ ^[A-Za-z0-9._/-]+$ ]]; then
            echo "::error::Invalid nanos_ref '${NANOS_REF}'"
            exit 1
          fi

      - name: Resolve source artifact
        id: source
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_RUN_ID: ${{ inputs.source_run_id }}
          REQUESTED_REVISION: ${{ inputs.source_revision }}
          CALLER_RUNNER: ${{ inputs.runner }}
        run: |
          set -euo pipefail

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
            -H "X-GitHub-Api-Version: 2022-11-28"
          )

          source_run_id="$REQUESTED_RUN_ID"
          if [[ -z "$source_run_id" && -n "$CALLER_RUNNER" ]]; then
            source_run_id="$GITHUB_RUN_ID"
          fi

          if [[ -z "$source_run_id" ]]; then
            branch=$(jq -rn --arg value "$GITHUB_REF_NAME" '$value | @uri')
            echo "Looking for latest successful run on ${GITHUB_REF_NAME} with ${NANOS_ARTIFACT}"

            for page in 1 2 3 4 5; do
              runs=$(curl -fsSL "${headers[@]}" \
                "${api}/actions/runs?branch=${branch}&status=success&per_page=50&page=${page}")

              while IFS= read -r run_id; do
                artifacts=$(curl -fsSL "${headers[@]}" \
                  "${api}/actions/runs/${run_id}/artifacts?per_page=100")

                if jq -e --arg name "$NANOS_ARTIFACT" \
                  '.artifacts[] | select(.name == $name and .expired == false)' \
                  >/dev/null <<<"$artifacts"; then
                  source_run_id="$run_id"
                  break 2
                fi
              done < <(jq -r '.workflow_runs[].id' <<<"$runs")
            done
          fi

          if [[ -z "$source_run_id" ]]; then
            echo "::error::No successful workflow run on ${GITHUB_REF_NAME} contains ${NANOS_ARTIFACT}."
            exit 1
          fi

          source_sha="$REQUESTED_REVISION"
          if [[ -z "$source_sha" ]]; then
            source_run=$(curl -fsSL "${headers[@]}" "${api}/actions/runs/${source_run_id}")
            source_sha=$(jq -r '.head_sha // empty' <<<"$source_run")
          fi
          if [[ ! "$source_sha" =~ ^[0-9a-fA-F]{40,64}$ ]]; then
            echo "::error::failed to resolve source revision for workflow run ${source_run_id}"
            exit 1
          fi

          echo "Using ${NANOS_ARTIFACT} from workflow run ${source_run_id}"
          echo "run_id=${source_run_id}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${source_sha}" >> "$GITHUB_OUTPUT"

      - name: Download ant binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ env.NANOS_ARTIFACT }}
          path: packages/sandbox
          github-token: ${{ github.token }}
          run-id: ${{ steps.source.outputs.run_id }}

      - name: Setup ops
        uses: ./.github/actions/setup-ops

      - name: Install Nanos build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ca-certificates \
            clang \
            curl \
            git \
            jq \
            lld \
            llvm \
            make \
            perl \
            python3 \
            xxd

          if [[ "$SANDBOX_ARCH" == "x64" ]]; then
            sudo apt-get install -y nasm
          fi

      - name: Checkout Nanos
        id: nanos-source
        run: |
          set -euo pipefail
          git init nanos-src
          git -C nanos-src remote add origin https://github.com/nanovms/nanos.git
          git -C nanos-src fetch --depth 1 origin "$NANOS_REF"
          git -C nanos-src checkout --detach FETCH_HEAD
          revision=$(git -C nanos-src rev-parse HEAD)
          echo "revision=${revision}" >> "$GITHUB_OUTPUT"
          echo "Using Nanos ${revision}"

      - name: Apply Ant sandbox Nanos patches
        run: |
          set -euo pipefail
          for patch in packages/sandbox/patches/*.patch; do
            echo "Applying ${patch}"
            git -C nanos-src apply "$GITHUB_WORKSPACE/$patch"
          done

      - name: Cache Nanos kernel build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            nanos-src/vendor
            nanos-src/output
          key: nanos-kernel-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ steps.nanos-source.outputs.revision }}-${{ hashFiles('packages/sandbox/patches/*.patch') }}
          restore-keys: |
            nanos-kernel-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-${{ steps.nanos-source.outputs.revision }}-
            nanos-kernel-${{ runner.os }}-${{ runner.arch }}-${{ inputs.arch }}-

      - name: Build patched Nanos kernel
        run: |
          set -euo pipefail
          make -C nanos-src PLATFORM="$NANOS_PLATFORM" ARCH="$NANOS_ARCH" CC=clang kernel
          cp "nanos-src/output/platform/${NANOS_PLATFORM}/bin/kernel.img" "packages/sandbox/ant-kernel-${SANDBOX_ARCH}.img"

      - name: Build Nanos image
        id: image
        working-directory: packages/sandbox
        run: |
          set -euo pipefail
          chmod +x ant

          kernel_path="$PWD/ant-kernel-${SANDBOX_ARCH}.img"
          ant_revision="${{ steps.source.outputs.head_sha }}"
          if [[ ! "$ant_revision" =~ ^[0-9a-fA-F]{40,64}$ ]]; then
            echo "::error::failed to resolve Ant revision from source run"
            exit 1
          fi
          echo "ant_revision=${ant_revision}" >> "$GITHUB_OUTPUT"
          ops_home="$RUNNER_TEMP/ant-ops-home"
          case "$SANDBOX_ARCH" in
            aarch64) ops_kernel="$RUNNER_TEMP/ant-kernel-arm.img" ;;
            x64) ops_kernel="$RUNNER_TEMP/ant-kernel-x64.img" ;;
            *)
              echo "::error::unsupported Nanos architecture: ${SANDBOX_ARCH}"
              exit 1
              ;;
          esac
          rm -rf "$ops_home"
          mkdir -p "$ops_home/.ops/images"
          cp "$kernel_path" "$ops_kernel"

          cat > ops-sandbox.json <<JSON
          {
            "Kernel": "$ops_kernel",
            "NanosVersion": "$ant_revision",
            "Env": {
              "SSL_CERT_FILE": "/etc/ssl/certs/ca-certificates.crt"
            }
          }
          JSON

          OPS_HOME="$ops_home" ops build ./ant \
            -c ops-sandbox.json \
            -i "$NANOS_IMAGE" \
            --arch="$OPS_ARCH" \
            --consoles +pl011 \
            --consoles +16550 \
            -a "--sandbox-daemon"

          if [[ -f "$ops_home/.ops/images/${NANOS_IMAGE}.img" ]]; then
            cp "$ops_home/.ops/images/${NANOS_IMAGE}.img" "ant-sandbox-${SANDBOX_ARCH}.img"
          elif [[ -f "$ops_home/.ops/images/${NANOS_IMAGE}" ]]; then
            cp "$ops_home/.ops/images/${NANOS_IMAGE}" "ant-sandbox-${SANDBOX_ARCH}.img"
          else
            echo "::error::ops did not create ${NANOS_IMAGE} under temporary ops image dir"
            ls -la "$ops_home/.ops/images" || true
            exit 1
          fi

      - name: Shrink Nanos image
        working-directory: packages/sandbox
        run: |
          set -euo pipefail
          image="ant-sandbox-${SANDBOX_ARCH}.img"
          before=$(du -h "$image" | cut -f1)
          python3 shrink-image.py "$image" "$image"
          after=$(du -h "$image" | cut -f1)
          echo "Shrank ${image} from ${before} to ${after}"

      - name: Image info
        working-directory: packages/sandbox
        run: |
          ANT_SIZE=$(du -sh ant | cut -f1)
          KERNEL_SIZE=$(du -sh "ant-kernel-${SANDBOX_ARCH}.img" | cut -f1)
          IMG_SIZE=$(du -sh "ant-sandbox-${SANDBOX_ARCH}.img" | cut -f1)
          echo "## ant-sandbox (${SANDBOX_ARCH})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Source run: \`${{ steps.source.outputs.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Nanos ref: \`${NANOS_REF}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | size |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| ant binary | $ANT_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| patched kernel | $KERNEL_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| nanos image | $IMG_SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Upload image
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ant-sandbox-${{ inputs.arch }}
          path: |
            packages/sandbox/ant-sandbox-${{ inputs.arch }}.img
            packages/sandbox/ant-kernel-${{ inputs.arch }}.img
          retention-days: 7

      - name: Refresh manifest
        env:
          MANIFEST_REFRESH_TOKEN: ${{ secrets.MANIFEST_REFRESH_TOKEN }}
        if: ${{ github.event_name != 'pull_request' && env.MANIFEST_REFRESH_TOKEN != '' }}
        run: |
          curl -fsS -X POST -G https://manifest.antjs.org/v1/refresh \
            --data-urlencode "branch=${GITHUB_REF_NAME}" \
            --data-urlencode "run_id=${GITHUB_RUN_ID}" \
            --data-urlencode "revision=${{ steps.image.outputs.ant_revision }}" \
            -H "Authorization: Bearer ${MANIFEST_REFRESH_TOKEN}"
