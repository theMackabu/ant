name: Build All Platforms

on:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.timestamp.outputs.value }}
    steps:
      - id: timestamp
        run: echo "value=$(date +%s)" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-glibc-x64
          - linux-glibc-aarch64
          - linux-musl-x64
          - linux-musl-aarch64
          - macos-x64
          - macos-aarch64
          - windows-x64
    uses: ./.github/workflows/build-platform.yml
    with:
      platform: ${{ matrix.platform }}
      build_timestamp: ${{ needs.prepare.outputs.timestamp }}

  nanos-x64:
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    uses: ./.github/workflows/build-nanos.yml
    with:
      arch: x64
      artifact: ant-linux-x64-musl
      runner: ubuntu-latest
      image: ant-sandbox-x64
      source_revision: ${{ github.sha }}

  nanos-aarch64:
    needs: [build]
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    uses: ./.github/workflows/build-nanos.yml
    with:
      arch: aarch64
      artifact: ant-linux-aarch64-musl
      runner: ubuntu-24.04-arm
      image: ant-sandbox-aarch64
      source_revision: ${{ github.sha }}

  summary:
    name: Version
    needs: [build]
    runs-on: ubuntu-latest
    if: ${{ !cancelled() && needs.build.result != 'skipped' }}
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Download version artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          pattern: version-*
          path: versions

      - name: Generate summary
        id: version
        run: |
          VERSIONS=()
          for dir in versions/version-*; do
            v=$(cat "$dir/version.txt" 2>/dev/null || echo "N/A")
            VERSIONS+=("$v")
          done

          UNIQUE=($(printf '%s\n' "${VERSIONS[@]}" | sort -u))

          if [[ ${#UNIQUE[@]} -ne 1 ]]; then
            echo "::error::Version mismatch across platforms: ${UNIQUE[*]}"
            echo "## ❌ Version Mismatch" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Expected all platforms to have the same version, but found: ${UNIQUE[*]}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "value=${UNIQUE[0]}" >> "$GITHUB_OUTPUT"
          echo "## Build Version: \`${UNIQUE[0]}\`" >> $GITHUB_STEP_SUMMARY

  refresh-manifest:
    name: Refresh manifest
    needs: [build, nanos-x64, nanos-aarch64, summary]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && always() && !cancelled() && needs.summary.result == 'success' && (needs.build.result == 'success' || needs.nanos-x64.result == 'success' || needs.nanos-aarch64.result == 'success') }}
    steps:
      - name: Refresh manifest
        env:
          MANIFEST_REFRESH_TOKEN: ${{ secrets.MANIFEST_REFRESH_TOKEN }}
        if: ${{ env.MANIFEST_REFRESH_TOKEN != '' }}
        run: |
          curl -fsS -X POST -G https://manifest.antjs.org/v1/refresh \
            --data-urlencode "branch=${GITHUB_REF_NAME}" \
            --data-urlencode "run_id=${GITHUB_RUN_ID}" \
            --data-urlencode "revision=${GITHUB_SHA}" \
            -H "Authorization: Bearer ${MANIFEST_REFRESH_TOKEN}"
